services:
  db-lelu-seven:
    image: postgres:15
    environment:
      POSTGRES_DB: lelu_seven_finance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  api-lululele-finance:
    build: .
    depends_on:
      db-lelu-seven:
        condition: service_healthy
    ports:
      - '8080:8080'
    env_file:
      - .env
volumes:
  pgdata:


